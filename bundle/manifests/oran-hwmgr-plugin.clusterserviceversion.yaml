apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "hwmgr-plugin.oran.openshift.io/v1alpha1",
          "kind": "HardwareManager",
          "metadata": {
            "labels": {
              "app.kubernetes.io/created-by": "oran-hwmgr-plugin",
              "app.kubernetes.io/instance": "hardwaremanager-sample",
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "hardwaremanager",
              "app.kubernetes.io/part-of": "oran-hwmgr-plugin"
            },
            "name": "hardwaremanager-sample"
          },
          "spec": {
            "adaptor-id": "dell-hwmgr",
            "dell-data": {
              "user": "admin"
            }
          },
          "status": {
            "observedGeneration": 1
          }
        }
      ]
    capabilities: Basic Install
    operators.operatorframework.io/builder: operator-sdk-v1.36.1
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
  name: oran-hwmgr-plugin.v0.0.1
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: HardwareManager is the Schema for the hardwaremanagers API
      displayName: Hardware Manager
      kind: HardwareManager
      name: hardwaremanagers.hwmgr-plugin.oran.openshift.io
      resources:
      - kind: Service
        name: policy-engine-service
        version: v1
      specDescriptors:
      - description: The adaptor ID
        displayName: Adaptor ID
        path: adaptor-id
      - description: Config data for an instance of the dell-hwmgr adaptor
        displayName: Dell Data
        path: dell-data
      - description: The username for connection to the Dell Hardware Manager
        displayName: User
        path: dell-data.user
      - description: Config data for an instance of the loopback adaptor
        displayName: Loopback Data
        path: loopback-data
      - description: A test string
        displayName: Addtional Info
        path: loopback-data.additional-info
      statusDescriptors:
      - description: Conditions describe the state of the UpdateService resource.
        displayName: Conditions
        path: conditions
      - displayName: Observed Generation
        path: observedGeneration
      version: v1alpha1
  description: O-Cloud Hardware Manager Plugin
  displayName: O-Cloud Hardware Manager Plugin
  icon:
  - base64data: ""
    mediatype: ""
  install:
    spec:
      clusterPermissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          verbs:
          - create
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - ""
          resources:
          - secrets
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - hwmgr-plugin.oran.openshift.io
          resources:
          - hardwaremanagers
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - hwmgr-plugin.oran.openshift.io
          resources:
          - hardwaremanagers/finalizers
          verbs:
          - update
        - apiGroups:
          - hwmgr-plugin.oran.openshift.io
          resources:
          - hardwaremanagers/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - o2ims-hardwaremanagement.oran.openshift.io
          resources:
          - nodepools
          verbs:
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - o2ims-hardwaremanagement.oran.openshift.io
          resources:
          - nodepools/finalizers
          verbs:
          - update
        - apiGroups:
          - o2ims-hardwaremanagement.oran.openshift.io
          resources:
          - nodepools/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - o2ims-hardwaremanagement.oran.openshift.io
          resources:
          - nodes
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - o2ims-hardwaremanagement.oran.openshift.io
          resources:
          - nodes/finalizers
          verbs:
          - update
        - apiGroups:
          - o2ims-hardwaremanagement.oran.openshift.io
          resources:
          - nodes/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - authentication.k8s.io
          resources:
          - tokenreviews
          verbs:
          - create
        - apiGroups:
          - authorization.k8s.io
          resources:
          - subjectaccessreviews
          verbs:
          - create
        serviceAccountName: oran-hwmgr-plugin-controller-manager
      deployments:
      - label:
          app.kubernetes.io/component: manager
          app.kubernetes.io/created-by: oran-hwmgr-plugin
          app.kubernetes.io/instance: controller-manager
          app.kubernetes.io/managed-by: kustomize
          app.kubernetes.io/name: deployment
          app.kubernetes.io/part-of: oran-hwmgr-plugin
          control-plane: controller-manager
        name: oran-hwmgr-plugin-controller-manager
        spec:
          replicas: 1
          selector:
            matchLabels:
              control-plane: controller-manager
          strategy: {}
          template:
            metadata:
              annotations:
                kubectl.kubernetes.io/default-container: manager
              labels:
                control-plane: controller-manager
            spec:
              containers:
              - args:
                - --secure-listen-address=0.0.0.0:8443
                - --upstream=http://127.0.0.1:8080/
                - --logtostderr=true
                - --v=0
                image: gcr.io/kubebuilder/kube-rbac-proxy:v0.15.0
                name: kube-rbac-proxy
                ports:
                - containerPort: 8443
                  name: https
                  protocol: TCP
                resources:
                  limits:
                    cpu: 500m
                    memory: 128Mi
                  requests:
                    cpu: 5m
                    memory: 64Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
              - args:
                - --health-probe-bind-address=:8081
                - --metrics-bind-address=127.0.0.1:8080
                - --leader-elect
                command:
                - /manager
                env:
                - name: MY_POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: MY_POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                image: quay.io/openshift-kni/oran-hwmgr-plugin:0.0.1
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 15
                  periodSeconds: 20
                name: manager
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  limits:
                    cpu: 500m
                    memory: 128Mi
                  requests:
                    cpu: 10m
                    memory: 64Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
              securityContext:
                runAsNonRoot: true
              serviceAccountName: oran-hwmgr-plugin-controller-manager
              terminationGracePeriodSeconds: 10
      permissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - coordination.k8s.io
          resources:
          - leases
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        serviceAccountName: oran-hwmgr-plugin-controller-manager
    strategy: deployment
  installModes:
  - supported: false
    type: OwnNamespace
  - supported: false
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - ORAN
  - plugin
  links:
  - name: Oran Hwmgr Plugin
    url: https://oran-hwmgr-plugin.domain
  maintainers:
  - email: dpenney@redhat.com
    name: Don Penney
  maturity: alpha
  minKubeVersion: 1.28.0
  provider:
    name: Red Hat
  version: 0.0.1
